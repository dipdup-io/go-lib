on:
  push:

name: Tests
permissions:
  contents: read
  pull-requests: read
jobs:
  golangci:
    name: Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.8.0
          args: --timeout=5m
  test:
    strategy:
      matrix:
        module: [config, database, hasura, node, prometheus, tools, tzkt]
    name: Test ${{ matrix.module }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.x

      - name: Golang tests
        env:
          GO111MODULE: on
        run: |
          cd ${{ matrix.module }}
          go mod download
          go test -p 8 ./...